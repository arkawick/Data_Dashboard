name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.7.0

      - name: Run ruff
        run: ruff check . --ignore E501,E402,W291 --exclude __pycache__

  # ── Unit tests ───────────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - "27017:27017"
        options: >-
          --health-cmd "mongosh --eval \"db.runCommand('ping').ok\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pymongo networkx neo4j fastapi httpx pytest pytest-asyncio \
                      uvicorn pydantic prometheus-client anthropic

      - name: Run retriever tests
        run: pytest tests/test_retriever.py tests/test_graph.py -v --tb=short

      - name: Start FastAPI in background and run API tests
        run: |
          uvicorn graphrag.api:app --host 0.0.0.0 --port 8001 &
          sleep 3
          pytest tests/test_api.py -v --tb=short

  # ── Docker build smoke test ───────────────────────────────────────────────────
  docker-build:
    name: Docker Compose build + smoke test
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - name: Copy .env
        run: cp .env.example .env

      - name: Build images
        run: docker compose build --no-cache django fastapi

      - name: Start services
        run: docker compose up -d mongo redis django fastapi

      - name: Wait for services
        run: sleep 20

      - name: Smoke test Django
        run: curl -f http://localhost:8000/ || (docker compose logs django && exit 1)

      - name: Smoke test FastAPI
        run: curl -f http://localhost:8001/health || (docker compose logs fastapi && exit 1)

      - name: Tear down
        if: always()
        run: docker compose down -v
